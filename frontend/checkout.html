<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - FreshBite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Fresh<span>Bite</span></a>
            <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="meals.html">Meals</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="auth-links"></li>
            </ul>
        </div>
    </nav>

    <section class="page-header">
        <h1>Checkout</h1>
        <p>Complete your order</p>
    </section>

    <main class="container" style="padding: 40px 20px;">
        <div id="alert-container"></div>
        <div class="checkout-layout">
            <form id="checkout-form" class="checkout-form">
                <h2>Delivery Details</h2>
                <div class="form-group">
                    <label for="customerName">Full Name</label>
                    <input type="text" id="customerName" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label for="deliveryAddress">Delivery Address</label>
                    <textarea id="deliveryAddress" required placeholder="Enter your full delivery address"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Place Order</button>
            </form>
            <div class="cart-summary" id="checkout-summary">
                <div class="loading">Loading...</div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 FreshBite. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
