<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - FreshBite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Fresh<span>Bite</span></a>
            <button class="nav-toggle" aria-label="Toggle navigation">&#9776;</button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="meals.html">Meals</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li id="auth-links"></li>
            </ul>
        </div>
    </nav>

    <section class="page-header">
        <h1>Your Cart</h1>
        <p>Review your selected meals</p>
    </section>

    <main class="container" style="padding: 40px 20px;">
        <div class="cart-layout">
            <div class="cart-items" id="cart-container">
                <div class="loading">Loading cart...</div>
            </div>
            <div class="cart-summary" id="cart-summary">
                <h3>Order Summary</h3>
            </div>
        </div>
        <div style="text-align: right; margin-top: 20px;">
            <a href="checkout.html" class="btn btn-primary" id="checkout-btn" style="display: none;">Proceed to Checkout</a>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 FreshBite. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
