# application-example.properties
spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:freshbite}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:password}}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT:}
server.port=${PORT:8080}
freshbite.admin.email=${FRESHBITE_ADMIN_EMAIL:admin@freshbite.com}
freshbite.admin.password=${FRESHBITE_ADMIN_PASSWORD:admin123}
freshbite.frontend.path=${FRESHBITE_FRONTEND_PATH:frontend}